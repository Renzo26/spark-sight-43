services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      HOST: "0.0.0.0"
      PORT: "3000"
      NODE_ENV: production
    restart: unless-stopped
    networks:
      easypanel:
        aliases:
          - wnbf_dashboard
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  easypanel:
    external: true
